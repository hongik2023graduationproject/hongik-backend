version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: hongik-backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=production
      - PORT=8080
      - INTERPRETER_PATH=/app/HongIk
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - MAX_CONCURRENT_EXEC=5
